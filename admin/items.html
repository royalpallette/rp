<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Items | Royal Pallette Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { brand: { DEFAULT: '#fb7185', dark: '#be123c' }, dark: '#171717' } }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; } </style>
    <script src="../js/admin_auth.js"></script>
    <script> checkAdminAuth(); </script>
</head>
<body class="text-gray-800 antialiased flex h-screen overflow-hidden">
    
    <!-- Sidebar -->
    <aside class="w-64 bg-dark text-white flex flex-col">
        <div class="h-20 flex items-center px-6 border-b border-gray-700">
            <span class="text-2xl font-bold tracking-tight text-brand">Admin Panel</span>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2">
            <a href="pos.html" class="flex items-center px-4 py-3 text-gray-300 hover:bg-gray-800 hover:text-white rounded-lg transition">POS Terminal</a>
            <a href="items.html" class="flex items-center px-4 py-3 bg-brand text-white rounded-lg shadow-md transition">Manage Items</a>
            <a href="orders.html" class="flex items-center px-4 py-3 text-gray-300 hover:bg-gray-800 hover:text-white rounded-lg transition">Orders</a>
        </nav>
        <div class="p-4 border-t border-gray-800">
            <button onclick="adminLogout()" class="block w-full text-left py-2 px-4 text-red-400 hover:text-red-300 hover:bg-gray-800 rounded transition">Logout</button>
        </div>
        <div class="p-4 border-t border-gray-700">
            <a href="../index.html" class="text-sm text-gray-400 hover:text-white flex items-center gap-2">
                &larr; Back to Shop
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full overflow-hidden">
        <header class="h-20 bg-white border-b border-gray-200 flex items-center px-8 shadow-sm">
            <h1 class="text-2xl font-semibold text-gray-800">Inventory Management</h1>
        </header>

        <div class="flex-1 overflow-auto p-8">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                
                <!-- Add Item Form -->
                <div class="lg:col-span-1 bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                    <h2 class="text-lg font-semibold mb-4 border-b pb-2">Add New Item</h2>
                    <form id="add-item-form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Product Name</label>
                            <input type="text" id="item-name" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-brand">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                            <textarea id="item-desc" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-brand"></textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Price (Rs.)</label>
                            <input type="number" id="item-price" required min="0" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-brand">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Image URL</label>
                            <input type="url" id="item-image" placeholder="https://..." class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-brand">
                        </div>
                        
                        <div class="pt-2">
                            <h3 class="text-sm font-semibold text-gray-800 mb-2">Categorization</h3>
                            <div class="space-y-3">
                                <div>
                                    <label class="block text-xs text-gray-500 mb-1">Department</label>
                                    <input type="text" id="item-dept" required placeholder="e.g. Cosmetics" class="w-full px-3 py-1.5 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-1 focus:ring-brand">
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-500 mb-1">Main Category</label>
                                    <input type="text" id="item-main-cat" required placeholder="e.g. Face Makeup" class="w-full px-3 py-1.5 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-1 focus:ring-brand">
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-500 mb-1">Sub Category</label>
                                    <input type="text" id="item-sub-cat" placeholder="e.g. Foundation" class="w-full px-3 py-1.5 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-1 focus:ring-brand">
                                </div>
                            </div>
                        </div>

                        <button type="submit" id="add-btn" class="w-full mt-4 bg-dark text-white py-2 rounded-md hover:bg-black transition font-medium">Add Item to DB</button>
                        <div id="status-msg" class="text-sm text-center hidden"></div>
                    </form>
                </div>

                <!-- Items List -->
                <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                    <h2 class="text-lg font-semibold mb-4 border-b pb-2">Current Inventory</h2>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-50 text-gray-600 text-sm border-b">
                                    <th class="p-3 font-medium">Name</th>
                                    <th class="p-3 font-medium">Category</th>
                                    <th class="p-3 font-medium">Price</th>
                                    <th class="p-3 font-medium text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="inventory-list" class="divide-y divide-gray-100">
                                <tr><td colspan="4" class="p-4 text-center text-gray-500 text-sm">Loading items...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script type="module" src="../js/admin_items.js"></script>
</body>
</html>
