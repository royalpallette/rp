<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Image Editor | Royal Pallette Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { brand: { DEFAULT: '#fb7185', dark: '#be123c' }, dark: '#171717' } }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style> 
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; } 
        #editor-canvas {
            max-width: 100%;
            max-height: 500px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border-radius: 12px;
            background: #fff url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAoAAAAKCAYAAACNMs+9AAAAAXNSR0IArs4c6QAAACVJREFUKFNjZCASMDKgAjBRVIv/UY34g1LEH5QiviAV8QWliB8ATsYJAoKhyuUAAAAASUVORK5CYII=');
            cursor: crosshair;
        }
    </style>
    <script src="../js/admin_auth.js"></script>
    <script> checkAdminAuth(); </script>
    <script type="module" src="../js/favicon.js"></script>
    <script src="../js/admin_sidebar.js"></script>
</head>
<body class="text-gray-800 antialiased flex h-screen overflow-hidden">
    
    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full overflow-hidden bg-gray-50">
        <header class="h-20 bg-white border-b border-gray-200 flex items-center px-8 shadow-sm flex-shrink-0">
            <div>
                <h1 class="text-xl font-bold text-gray-800">Advanced Image Studio</h1>
                <p class="text-xs text-gray-500">Capture, Edit, and Save Product Images</p>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6">
            <div class="flex flex-col lg:flex-row gap-6 max-w-7xl mx-auto h-full">
                
                <!-- Left Panel: Input & Settings -->
                <div class="w-full lg:w-1/3 flex flex-col gap-6 flex-shrink-0">
                    
                    <!-- Metadata Form -->
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
                        <h2 class="font-bold text-gray-800 mb-4 border-b pb-2">1. Link to Product</h2>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-1">Item Code *</label>
                                <input type="text" id="img-code" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-brand focus:outline-none" placeholder="e.g. 1001">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-1">Description (Optional)</label>
                                <input type="text" id="img-desc" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-brand focus:outline-none" placeholder="e.g. Front View">
                            </div>
                        </div>
                    </div>

                    <!-- Input Methods -->
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
                        <h2 class="font-bold text-gray-800 mb-4 border-b pb-2">2. Load Image</h2>
                        
                        <div id="drop-zone" class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center cursor-pointer hover:border-brand hover:bg-red-50 transition relative group">
                            <input type="file" id="img-file" class="hidden" accept="image/*">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 mx-auto text-gray-400 group-hover:text-brand mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                            <p class="font-semibold text-gray-700 text-sm">Click to Browse</p>
                            <p class="text-xs text-gray-500 mt-1">or Drag & Drop / Ctrl+V to paste</p>
                        </div>
                        
                        <div class="mt-4 text-center">
                            <span class="text-xs text-gray-500 uppercase font-bold tracking-wider">OR</span>
                        </div>

                        <button id="start-cam-btn" class="mt-4 w-full flex items-center justify-center gap-2 bg-gray-800 hover:bg-gray-900 text-white font-medium py-3 px-4 rounded-lg transition shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                            Take Photo with Camera
                        </button>
                    </div>

                </div>

                <!-- Right Panel: Canvas Editor -->
                <div class="w-full lg:w-2/3 flex flex-col bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <!-- Editor Toolbar -->
                    <div class="bg-gray-50 border-b border-gray-200 p-3 flex flex-wrap gap-2 items-center justify-between">
                        <div class="flex gap-2 items-center">
                            <button id="add-text-btn" class="px-3 py-1.5 bg-white border border-gray-300 rounded text-sm font-medium hover:bg-gray-100 flex items-center gap-1 shadow-sm">
                                <span>T</span> Add Text
                            </button>
                            <button id="add-logo-btn" class="px-3 py-1.5 bg-white border border-gray-300 rounded text-sm font-medium hover:bg-gray-100 flex items-center gap-1 shadow-sm">
                                <span>✨</span> Add Logo
                            </button>
                            <button id="crop-btn" class="px-3 py-1.5 bg-white border border-gray-300 rounded text-sm font-medium hover:bg-gray-100 flex items-center gap-1 shadow-sm">
                                <span>✂️</span> Crop
                            </button>
                            <div class="h-6 w-px bg-gray-300 mx-1"></div>
                            <button id="reset-canvas-btn" class="px-3 py-1.5 text-gray-500 hover:text-red-500 text-sm font-medium transition">
                                Reset
                            </button>
                        </div>
                    </div>

                    <!-- Text Tool Options (Hidden by default) -->
                    <div id="text-tool-options" class="hidden bg-gray-100 border-b border-gray-200 p-3 flex gap-3 items-center">
                        <input type="text" id="overlay-text" placeholder="Enter text..." class="border border-gray-300 rounded px-2 py-1 text-sm flex-1">
                        <input type="color" id="overlay-color" value="#ffffff" class="w-8 h-8 rounded cursor-pointer border-0">
                        <select id="overlay-size" class="border border-gray-300 rounded px-2 py-1 text-sm">
                            <option value="20px">Small</option>
                            <option value="40px" selected>Medium</option>
                            <option value="60px">Large</option>
                        </select>
                        <div class="text-xs text-gray-500 flex-1 ml-2 font-medium italic">Click anywhere on the image to place text!</div>
                        <button id="cancel-text-btn" class="bg-gray-200 text-gray-700 px-4 py-1 text-sm rounded font-bold hover:bg-gray-300">Done</button>
                    </div>

                    <!-- Canvas Area -->
                    <div class="flex-1 bg-gray-100 flex flex-col items-center justify-center p-6 relative overflow-hidden" id="canvas-container">
                        <p id="canvas-placeholder" class="text-gray-400 font-medium text-lg absolute z-0 flex flex-col items-center">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mb-2 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                            Image will appear here
                        </p>
                        <canvas id="editor-canvas" class="relative z-10 hidden"></canvas>
                        
                        <!-- Cropper Actions (Hidden by default) -->
                        <div id="crop-actions" class="absolute bottom-4 left-1/2 transform -translate-x-1/2 flex gap-2 z-30 hidden">
                            <button id="apply-crop-btn" class="bg-green-500 text-white px-4 py-2 rounded-full font-bold shadow-lg hover:bg-green-600">Apply Crop</button>
                            <button id="cancel-crop-btn" class="bg-red-500 text-white px-4 py-2 rounded-full font-bold shadow-lg hover:bg-red-600">Cancel</button>
                        </div>
                    </div>

                    <!-- Action Footer -->
                    <div class="bg-white border-t border-gray-200 p-4 flex justify-between items-center">
                        <div id="status-msg" class="text-sm font-medium"></div>
                        <button id="save-image-btn" class="bg-brand hover:bg-brand-dark text-white px-6 py-2.5 rounded-lg font-bold shadow-md transition flex items-center gap-2">
                            <span>💾</span> Save to Database
                        </button>
                    </div>
                </div>

            </div>
            
            <!-- Gallery Section (Below) -->
            <div class="max-w-7xl mx-auto mt-8 bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-8">
                <h2 class="font-bold text-gray-800 mb-4 border-b pb-2">Saved Product Images</h2>
                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4" id="gallery">
                    <div class="col-span-full text-center py-10 text-gray-400">Loading gallery...</div>
                </div>
            </div>
        </div>
    </main>

    <!-- Camera Modal -->
    <div id="camera-modal" class="fixed inset-0 bg-black bg-opacity-90 hidden items-center justify-center z-50 flex-col">
        <div class="bg-dark p-4 rounded-xl max-w-3xl w-full mx-4 shadow-2xl relative">
            <button id="close-cam-btn" class="absolute -top-4 -right-4 bg-red-500 text-white rounded-full w-8 h-8 flex items-center justify-center font-bold shadow hover:bg-red-600 transition">&times;</button>
            <div class="rounded-lg overflow-hidden bg-black aspect-video relative flex items-center justify-center">
                <video id="webcam-video" autoplay playsinline class="w-full h-full object-cover hidden"></video>
                <div id="cam-loading" class="text-white flex flex-col items-center">
                    <svg class="animate-spin h-8 w-8 text-brand mb-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    Requesting Camera...
                </div>
            </div>
            <div class="mt-6 flex justify-center">
                <button id="capture-btn" class="bg-brand text-white px-8 py-4 rounded-full font-bold shadow-lg hover:bg-brand-dark transition transform hover:scale-105 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                    Snap Photo
                </button>
            </div>
        </div>
    </div>

    <!-- Hidden standard canvas used for image processing -->
    <canvas id="processing-canvas" class="hidden"></canvas>

    <script type="module" src="../js/admin_images.js"></script>
</body>
</html>
