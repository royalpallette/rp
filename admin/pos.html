<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Terminal | Royal Pallette</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { brand: { DEFAULT: '#fb7185', dark: '#be123c' }, dark: '#171717' } }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; } </style>
    <script src="../js/admin_auth.js"></script>
    <script> checkAdminAuth(); </script>
<script type="module" src="../js/favicon.js"></script>
</head>
<body class="text-gray-800 antialiased flex h-screen overflow-hidden">
    
    <!-- Sidebar -->
    <aside class="w-20 lg:w-64 bg-dark text-white flex flex-col flex-shrink-0">
        <div class="h-20 flex items-center justify-center lg:justify-start lg:px-6 border-b border-gray-700">
            <span class="hidden lg:block text-xl font-bold tracking-tight text-brand">Royal POS</span>
            <span class="lg:hidden text-2xl font-bold text-brand">RP</span>
        </div>
        <nav class="flex-1 px-2 lg:px-4 py-6 space-y-2">
            <a href="pos.html" class="flex items-center justify-center lg:justify-start px-4 py-3 bg-brand text-white rounded-lg shadow-md transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 lg:mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg>
                <span class="hidden lg:block">Terminal</span>
            </a>
            <a href="items.html" class="flex items-center justify-center lg:justify-start px-4 py-3 text-gray-300 hover:bg-gray-800 hover:text-white rounded-lg transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 lg:mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" /></svg>
                <span class="hidden lg:block">Inventory</span>
            </a>
            <a href="orders.html" class="flex items-center justify-center lg:justify-start px-4 py-3 text-gray-300 hover:bg-gray-800 hover:text-white rounded-lg transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 lg:mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>
                <span class="hidden lg:block">Orders</span>
            </a>
        </nav>
        <div class="p-4 border-t border-gray-700">
            <a href="../index.html" class="text-sm text-gray-400 hover:text-white flex items-center justify-center lg:justify-start gap-2">
                <span class="hidden lg:block">&larr; Back to Shop</span>
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full overflow-hidden">
        <header class="h-20 bg-white border-b border-gray-200 flex items-center justify-between px-8 shadow-sm flex-shrink-0">
            <div class="flex items-center w-1/2">
                <div class="relative w-full max-w-md">
                    <input type="text" id="pos-search" placeholder="Search products by name or barcode..." class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-full focus:outline-none focus:ring-2 focus:ring-brand">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400 absolute left-3 top-2.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p class="text-sm font-semibold text-gray-800">Admin User</p>
                    <p class="text-xs text-green-500 flex items-center gap-1 justify-end"><span class="w-2 h-2 rounded-full bg-green-500"></span> Online</p>
                </div>
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <!-- Product Grid (Left) -->
            <div class="flex-1 bg-gray-50 p-6 overflow-y-auto">
                <div class="flex gap-2 mb-6 overflow-x-auto pb-2">
                    <button class="px-4 py-1.5 bg-brand text-white text-sm font-medium rounded-full shadow-sm">All</button>
                    <button class="px-4 py-1.5 bg-white text-gray-600 border border-gray-200 text-sm font-medium rounded-full hover:bg-gray-50 transition">Cosmetics</button>
                    <button class="px-4 py-1.5 bg-white text-gray-600 border border-gray-200 text-sm font-medium rounded-full hover:bg-gray-50 transition">Skincare</button>
                </div>
                
                <div id="pos-products" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
                    <!-- Products injected by JS -->
                    <div class="col-span-full text-center py-20 text-gray-500">Loading products...</div>
                </div>
            </div>

            <!-- Cart Details (Right) -->
            <div class="w-96 bg-white border-l border-gray-200 flex flex-col flex-shrink-0 shadow-lg z-10">
                <div class="p-6 border-b border-gray-200 flex justify-between items-center bg-gray-50">
                    <h2 class="text-xl font-bold text-gray-800">Current Order</h2>
                    <span class="bg-brand text-white text-xs px-2 py-1 rounded-md font-semibold">POS</span>
                </div>
                
                <div class="flex-1 overflow-y-auto p-4 space-y-3" id="pos-cart">
                    <!-- Cart items injected by JS -->
                    <div class="text-center py-10 text-gray-400 text-sm italic">Cart is empty</div>
                </div>
                
                <div class="p-6 border-t border-gray-200 bg-gray-50">
                    <div class="flex justify-between text-gray-600 mb-2">
                        <span>Subtotal</span>
                        <span id="pos-subtotal">Rs. 0.00</span>
                    </div>
                    <div class="flex justify-between text-gray-600 mb-4">
                        <span>Tax (0%)</span>
                        <span>Rs. 0.00</span>
                    </div>
                    <div class="flex justify-between text-2xl font-bold text-gray-900 mb-6 border-t pt-4 border-gray-300">
                        <span>Total</span>
                        <span id="pos-total">Rs. 0.00</span>
                    </div>
                    
                    <button id="checkout-btn" class="w-full bg-green-500 hover:bg-green-600 text-white py-4 rounded-xl font-bold text-lg shadow-md transition flex justify-center items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
                        Pay & Checkout
                    </button>
                    <button id="clear-cart-btn" class="w-full mt-3 bg-red-100 text-red-600 hover:bg-red-200 py-2 rounded-lg font-semibold text-sm transition">
                        Clear Order
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="../js/pos.js"></script>
</body>
</html>
