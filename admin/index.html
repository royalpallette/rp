<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Royal Pallette</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { DEFAULT: '#fb7185', dark: '#be123c' },
                        dark: '#171717'
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style> 
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; } 
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
    </style>
    <script src="../js/admin_auth.js"></script>
    <script> checkAdminAuth(); </script>
    <script type="module" src="../js/favicon.js"></script>
</head>
<body class="flex h-screen overflow-hidden text-gray-800">

    <!-- Main Content Area -->
    <div class="flex-1 flex flex-col h-screen overflow-hidden relative w-full lg:w-auto">
        
        <!-- Header -->
        <header class="bg-white shadow-sm h-20 flex items-center px-8 shrink-0 justify-between">
            <h1 class="text-2xl font-bold text-gray-800 tracking-tight">Dashboard Overview</h1>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2">
                    <span class="relative flex h-3 w-3">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                    </span>
                    <span class="text-sm font-medium text-gray-600">System Live</span>
                </div>
            </div>
        </header>

        <!-- Main Workspace -->
        <main class="flex-1 overflow-y-auto custom-scrollbar p-8">
            <div class="max-w-7xl mx-auto space-y-6">

                <!-- Top Metrics Row -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <!-- Active Users -->
                    <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100 flex items-center justify-between">
                        <div>
                            <p class="text-sm font-medium text-gray-500 mb-1">Live Active Viewers</p>
                            <h3 class="text-4xl font-bold text-brand" id="stat-active-users">0</h3>
                        </div>
                        <div class="p-4 bg-brand bg-opacity-10 rounded-full text-brand">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                        </div>
                    </div>
                    <!-- Total Visits -->
                    <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100 flex items-center justify-between">
                        <div>
                            <p class="text-sm font-medium text-gray-500 mb-1">Total All-time Visits</p>
                            <h3 class="text-4xl font-bold text-gray-800" id="stat-total-visits">0</h3>
                        </div>
                        <div class="p-4 bg-blue-100 rounded-full text-blue-600">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>
                        </div>
                    </div>
                    <!-- Total Feedbacks -->
                    <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100 flex items-center justify-between">
                        <div>
                            <p class="text-sm font-medium text-gray-500 mb-1">Total Feedbacks</p>
                            <h3 class="text-4xl font-bold text-gray-800" id="stat-total-feedbacks">0</h3>
                        </div>
                        <div class="p-4 bg-yellow-100 rounded-full text-yellow-600">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z" /></svg>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <!-- Activity Log (Audit Trail) -->
                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 flex flex-col h-[500px]">
                        <div class="p-5 border-b border-gray-100 flex justify-between items-center">
                            <h3 class="text-lg font-semibold text-gray-800">Activity Log (Audit Trail)</h3>
                        </div>
                        <div class="p-5 flex-1 overflow-y-auto custom-scrollbar">
                            <ul id="activity-log-list" class="space-y-4">
                                <li class="text-center text-gray-400 py-10">Loading logs...</li>
                            </ul>
                        </div>
                    </div>

                    <!-- Recent Feedback -->
                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 flex flex-col h-[500px]">
                        <div class="p-5 border-b border-gray-100 flex justify-between items-center">
                            <h3 class="text-lg font-semibold text-gray-800">Recent Customer Feedback</h3>
                        </div>
                        <div class="p-5 flex-1 overflow-y-auto custom-scrollbar space-y-4" id="feedback-list">
                            <div class="text-center text-gray-400 py-10">Loading feedback...</div>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="../js/admin_sidebar.js"></script>
    <script type="module" src="../js/admin_dashboard.js"></script>
</body>
</html>
