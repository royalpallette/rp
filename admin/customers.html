<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers | Royal Pallette Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { brand: { DEFAULT: '#fb7185', dark: '#be123c' }, dark: '#171717' } } }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style> 
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
    <script src="../js/admin_auth.js"></script>
    <script> checkAdminAuth(); </script>
    <script type="module" src="../js/favicon.js"></script>
    <script src="../js/admin_sidebar.js"></script>
</head>
<body class="text-gray-800 antialiased flex h-screen overflow-hidden">
    
    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full overflow-hidden relative">
        <header class="h-20 bg-white border-b border-gray-200 flex items-center px-8 shadow-sm justify-between">
            <h1 class="text-2xl font-semibold text-gray-800 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-brand" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                </svg>
                Customer Management
            </h1>
            <button onclick="openAddCustModal()" class="bg-brand hover:bg-brand-dark text-white px-4 py-2 rounded-lg text-sm font-medium transition shadow-sm">
                + New Customer
            </button>
        </header>

        <div class="flex-1 overflow-auto p-8">
            <!-- Search and Filter -->
            <div class="mb-6 flex gap-4">
                <input type="text" id="search-customer" placeholder="Search by name, phone, or email..." class="w-1/3 px-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-brand">
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 text-gray-600 text-sm border-b">
                                <th class="p-4 font-medium">Name</th>
                                <th class="p-4 font-medium">Phone</th>
                                <th class="p-4 font-medium">Email</th>
                                <th class="p-4 font-medium">Joined Date</th>
                                <th class="p-4 font-medium text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="customers-list" class="divide-y divide-gray-100">
                            <tr><td colspan="5" class="p-4 text-center text-gray-500 text-sm">Loading customers...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Customer 360 Modal -->
    <div id="customer-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-4xl max-h-[90vh] flex flex-col">
            <!-- Modal Header -->
            <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center bg-gray-50 rounded-t-xl">
                <h3 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                    <span id="modal-cust-name" class="text-brand-dark">Customer Name</span>
                </h3>
                <button onclick="closeCustomerModal()" class="text-gray-400 hover:text-gray-600">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>

            <!-- Modal Body (Scrollable) -->
            <div class="p-6 overflow-y-auto custom-scrollbar flex-1 bg-gray-50 space-y-6">
                <!-- Info Cards -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-100">
                        <div class="text-xs text-gray-500 uppercase font-bold mb-1">Contact Info</div>
                        <div class="text-sm text-gray-800 font-medium" id="modal-cust-phone">...</div>
                        <div class="text-sm text-gray-600" id="modal-cust-email">...</div>
                        <div class="text-xs text-gray-400 mt-2" id="modal-cust-address">...</div>
                    </div>
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-100">
                        <div class="text-xs text-gray-500 uppercase font-bold mb-1">Loyalty Status</div>
                        <div class="text-xl font-bold text-brand-dark" id="modal-cust-points">0 Pts</div>
                        <div class="text-sm text-gray-600 mt-1">Tier: <span id="modal-cust-tier" class="font-semibold text-gray-800">Bronze</span></div>
                    </div>
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-100">
                        <div class="text-xs text-gray-500 uppercase font-bold mb-1">Total Lifetime Value</div>
                        <div class="text-xl font-bold text-green-600" id="modal-cust-spent">Rs. 0.00</div>
                        <div class="text-xs text-gray-400 mt-1" id="modal-cust-joined">Joined: ...</div>
                    </div>
                </div>

                <!-- Order History -->
                <div class="bg-white p-5 rounded-lg shadow-sm border border-gray-100">
                    <h4 class="text-md font-bold text-gray-800 mb-4 border-b pb-2">Order History</h4>
                    <div class="overflow-x-auto max-h-60 custom-scrollbar">
                        <table class="w-full text-left border-collapse text-sm">
                            <thead class="sticky top-0 bg-white">
                                <tr class="text-gray-500 border-b">
                                    <th class="py-2 font-medium">Order No</th>
                                    <th class="py-2 font-medium">Date</th>
                                    <th class="py-2 font-medium">Items</th>
                                    <th class="py-2 font-medium text-right">Total</th>
                                </tr>
                            </thead>
                            <tbody id="modal-order-history" class="divide-y divide-gray-100">
                                <!-- JS Populated -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Customer Modal -->
    <div id="add-customer-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-lg p-6 max-h-[90vh] overflow-y-auto">
            <h3 class="text-lg font-bold text-gray-800 mb-4">Add New Customer</h3>
            <div class="space-y-4">
                <!-- Names -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Full Name *</label>
                    <input type="text" id="new-cust-name" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-brand focus:outline-none" required>
                </div>
                
                <!-- Phones -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Phone Numbers</label>
                    <input type="text" id="new-cust-phone" placeholder="Phone 1 (Required) *" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-brand focus:outline-none mb-2">
                    <input type="text" id="new-cust-phone2" placeholder="Phone 2 (Optional)" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-brand focus:outline-none mb-2">
                    <input type="text" id="new-cust-phone3" placeholder="Phone 3 (Optional)" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-brand focus:outline-none">
                </div>

                <!-- Emails -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email Addresses</label>
                    <input type="email" id="new-cust-email" placeholder="Email 1 (Optional)" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-brand focus:outline-none mb-2">
                    <input type="email" id="new-cust-email2" placeholder="Email 2 (Optional)" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-brand focus:outline-none mb-2">
                    <input type="email" id="new-cust-email3" placeholder="Email 3 (Optional)" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-brand focus:outline-none">
                </div>
                <!-- Location Info -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Province *</label>
                        <select id="new-cust-province" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-brand focus:outline-none" required>
                            <option value="">Select Province</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">District *</label>
                        <select id="new-cust-district" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-brand focus:outline-none" disabled required>
                            <option value="">Select District</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Town *</label>
                        <select id="new-cust-town" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-brand focus:outline-none" disabled required>
                            <option value="">Select Town</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Postal Code *</label>
                        <input type="text" id="new-cust-zip" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-brand focus:outline-none bg-gray-100" readonly required>
                    </div>
                </div>

                <!-- Addresses -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Addresses</label>
                    <textarea id="new-cust-address" rows="1" placeholder="Address 1 (Optional)" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-brand focus:outline-none mb-2"></textarea>
                    <textarea id="new-cust-address2" rows="1" placeholder="Address 2 (Optional)" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-brand focus:outline-none mb-2"></textarea>
                    <textarea id="new-cust-address3" rows="1" placeholder="Address 3 (Optional)" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-brand focus:outline-none"></textarea>
                </div>
            </div>
            <div class="mt-6 flex justify-end gap-3">
                <button type="button" onclick="closeAddCustModal()" class="px-4 py-2 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg transition">Cancel</button>
                <button type="button" onclick="saveNewCustomer()" id="save-cust-btn" class="px-4 py-2 bg-brand text-white rounded-lg hover:bg-brand-dark transition shadow-md">Save Customer</button>
            </div>
        </div>
    </div>

    <script type="module" src="../js/admin_customers.js"></script>
</body>
</html>
