<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Signup | Royal Pallette</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { light: '#ffe4e6', DEFAULT: '#fb7185', dark: '#be123c' },
                        dark: '#171717'
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Playfair Display', 'serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; background-color: #fafafa; } .font-serif { font-family: 'Playfair Display', serif; } </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-xl">
        <div>
            <a href="../index.html" class="flex justify-center text-3xl font-serif font-bold text-brand-dark mb-2">Royal Pallette</a>
            <h2 class="mt-6 text-center text-2xl font-bold text-gray-900" id="form-title">Sign in to your account</h2>
        </div>
        
        <form class="mt-8 space-y-6" id="auth-form">
            <input type="hidden" name="remember" value="true">
            <div id="signup-fields" class="hidden space-y-4 mb-4">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700">Username</label>
                    <input id="username" name="username" type="text" class="appearance-none rounded-md relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-brand focus:border-brand focus:z-10 sm:text-sm">
                </div>
                <div>
                    <label for="phone" class="block text-sm font-medium text-gray-700">Phone Number</label>
                    <input id="phone" name="phone" type="tel" class="appearance-none rounded-md relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-brand focus:border-brand focus:z-10 sm:text-sm">
                </div>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label for="email-address" class="block text-sm font-medium text-gray-700">Email address</label>
                    <input id="email-address" name="email" type="email" autocomplete="email" required class="appearance-none rounded-md relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-brand focus:border-brand focus:z-10 sm:text-sm">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                    <input id="password" name="password" type="password" autocomplete="current-password" required class="appearance-none rounded-md relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-brand focus:border-brand focus:z-10 sm:text-sm">
                </div>
            </div>

            <div id="error-message" class="text-red-500 text-sm hidden text-center"></div>

            <div>
                <button type="submit" id="submit-btn" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-brand hover:bg-brand-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand transition">
                    Sign In
                </button>
            </div>
            
            <div class="relative">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-300"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-white text-gray-500">Or continue with</span>
                </div>
            </div>

            <div>
                <button type="button" id="google-btn" class="w-full flex items-center justify-center py-3 px-4 border border-gray-300 rounded-md shadow-sm bg-white text-sm font-medium text-gray-700 hover:bg-gray-50 transition">
                    <svg class="w-5 h-5 mr-2" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Sign in with Google
                </button>
            </div>
            <div class="text-center text-sm text-gray-600 mt-4">
                <span id="toggle-text">Don't have an account?</span> 
                <a href="#" id="toggle-auth" class="font-medium text-brand hover:text-brand-dark">Sign Up</a>
            </div>
        </form>
    </div>

    <!-- OTP Modal for Signup -->
    <div id="otp-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-2xl shadow-xl max-w-sm w-full text-center">
            <h3 class="text-2xl font-bold text-gray-900 mb-2">Verify Email</h3>
            <p class="text-sm text-gray-500 mb-6">We've sent a 6-digit OTP to your email address to verify your account.</p>
            
            <input type="text" id="otp-input" placeholder="Enter OTP (Use: 123456)" maxlength="6" class="w-full text-center tracking-widest text-2xl px-4 py-3 border border-gray-300 rounded-lg focus:ring-brand focus:border-brand mb-4">
            
            <div id="otp-error" class="text-red-500 text-sm mb-4 hidden">Invalid OTP. Please try again.</div>
            
            <button id="verify-otp-btn" class="w-full bg-brand text-white py-3 rounded-lg font-bold hover:bg-brand-dark transition">
                Verify & Create Account
            </button>
            <button id="cancel-otp-btn" class="w-full mt-2 text-gray-500 text-sm py-2 hover:text-gray-700">
                Cancel
            </button>
        </div>
    </div>

    <script type="module" src="../js/auth.js"></script>
</body>
</html>
