<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Royal Pallette</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { brand: { DEFAULT: '#fb7185', dark: '#be123c' }, dark: '#171717' } } }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; background-color: #fafafa; } </style>
<script type="module" src="../js/favicon.js"></script>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col">

    <!-- Simple Nav -->
    <nav class="bg-white border-b border-gray-200">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="../index.html" class="text-2xl font-bold text-brand-dark">Royal Pallette</a>
            <button id="logout-btn" class="text-sm text-gray-500 hover:text-brand transition">Logout</button>
        </div>
    </nav>

    <main class="flex-1 max-w-2xl w-full mx-auto p-6 mt-10">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
            <h1 class="text-2xl font-bold text-gray-900 mb-6">Edit Profile</h1>
            
            <form id="profile-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Username</label>
                    <input type="text" id="prof-username" required class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-brand focus:border-brand">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Email (Cannot be changed)</label>
                    <input type="email" id="prof-email" disabled class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-md bg-gray-50 text-gray-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Phone Number</label>
                    <input type="tel" id="prof-phone" required class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-brand focus:border-brand">
                </div>
                
                <div id="status-msg" class="text-sm hidden"></div>

                <div class="pt-4">
                    <button type="submit" id="save-btn" class="w-full bg-brand text-white py-3 rounded-lg font-medium hover:bg-brand-dark transition shadow-md">
                        Save Changes
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script type="module">
        import { auth, db } from '../js/firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { ref, get, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const form = document.getElementById('profile-form');
        const statusMsg = document.getElementById('status-msg');
        let currentUserUid = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUserUid = user.uid;
                document.getElementById('prof-email').value = user.email;
                
                try {
                    const snapshot = await get(ref(db, "users/" + user.uid));
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        document.getElementById('prof-username').value = data.username || '';
                        document.getElementById('prof-phone').value = data.phone || '';
                    }
                } catch (e) {
                    console.error("Error fetching profile", e);
                }
            } else {
                window.location.href = 'auth.html';
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.textContent = "Saving...";
            statusMsg.classList.add('hidden');

            try {
                await update(ref(db, "users/" + currentUserUid), {
                    username: document.getElementById('prof-username').value,
                    phone: document.getElementById('prof-phone').value
                });
                statusMsg.textContent = "Profile updated successfully!";
                statusMsg.className = "text-sm text-green-600 block mt-2";
            } catch (error) {
                console.error("Error updating profile", error);
                statusMsg.textContent = "Error updating profile.";
                statusMsg.className = "text-sm text-red-600 block mt-2";
            } finally {
                btn.disabled = false;
                btn.textContent = "Save Changes";
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.href = '../index.html';
            });
        });
    </script>
</body>
</html>
