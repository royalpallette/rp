<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart & Checkout | Royal Pallette</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { brand: { DEFAULT: '#fb7185', dark: '#be123c' }, dark: '#171717' } } }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; background-color: #fafafa; } </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col">

    <!-- Nav -->
    <nav class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <a href="../index.html" class="text-2xl font-bold text-brand-dark">Royal Pallette</a>
            <a href="../index.html" class="text-sm text-gray-500 hover:text-brand transition">&larr; Back to Shop</a>
        </div>
    </nav>

    <main class="flex-1 max-w-7xl w-full mx-auto p-4 sm:px-6 lg:px-8 mt-8">
        <h1 class="text-3xl font-bold text-gray-900 mb-8">Checkout</h1>
        
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Cart Items -->
            <div class="lg:col-span-7 bg-white rounded-2xl shadow-sm border border-gray-100 p-6 h-fit">
                <h2 class="text-xl font-semibold mb-4 border-b pb-4">Your Cart Items</h2>
                <div id="cart-items" class="space-y-4">
                    <div class="text-center py-10 text-gray-500">Loading cart...</div>
                </div>
                <div class="mt-6 pt-4 border-t border-gray-100 flex justify-between items-center text-xl font-bold text-gray-900">
                    <span>Total:</span>
                    <span id="cart-total">Rs. 0.00</span>
                </div>
            </div>

            <!-- Checkout Form -->
            <div class="lg:col-span-5 bg-white rounded-2xl shadow-sm border border-gray-100 p-6 h-fit">
                <h2 class="text-xl font-semibold mb-4 border-b pb-4">Delivery Details</h2>
                
                <form id="checkout-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Full Name</label>
                        <input type="text" id="chk-name" required class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-brand focus:border-brand">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Phone Number</label>
                        <input type="tel" id="chk-phone" required class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-brand focus:border-brand">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Delivery Address</label>
                        <textarea id="chk-address" rows="3" required class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-brand focus:border-brand"></textarea>
                    </div>
                    
                    <div class="pt-2">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Payment Method</label>
                        <div class="p-3 border border-brand bg-brand bg-opacity-10 rounded-md flex items-center">
                            <input type="radio" checked disabled class="text-brand focus:ring-brand h-4 w-4">
                            <span class="ml-2 text-brand-dark font-medium">Cash On Delivery (COD)</span>
                        </div>
                    </div>

                    <button type="submit" id="place-order-btn" class="w-full mt-6 bg-brand text-white py-4 rounded-lg font-bold text-lg hover:bg-brand-dark transition shadow-md">
                        Place Order
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script type="module" src="../js/cart.js"></script>
</body>
</html>
